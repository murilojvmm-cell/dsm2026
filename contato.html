<!-- CONTEÚDO -->
<div class="container mt-4">

<h2 class="mb-4">Cadastro de Produto</h2>

<div class="row justify-content-center">
<div class="col-md-6">

<form>

<!-- NOME -->
<div class="mb-3">
<label class="form-label">
<i class="bi bi-box"></i> Nome do Produto
</label>
<input type="text" class="form-control">
</div>

<!-- VALOR -->
<div class="mb-3">
<label class="form-label">
<i class="bi bi-currency-dollar"></i> Valor
</label>
<input type="number" step="0.5" class="form-control">
</div>

<!-- QUANTIDADE -->
<div class="mb-3">
<label class="form-label">
<i class="bi bi-123"></i> Quantidade
</label>
<input type="number" class="form-control">
</div>

<!-- CATEGORIA -->
<div class="mb-3">
<label class="form-label">
<i class="bi bi-list"></i> Categoria
</label>
<select class="form-select">
<option>Pães</option>
<option>Doces</option>
<option>Salgados</option>
</select>
</div>

<!-- FABRICADO EM -->
<div class="mb-3">
<label class="form-label">
<i class="bi bi-geo-alt"></i> Fabricado em
</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="estado">
<label class="form-check-label">SP</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="estado">
<label class="form-check-label">RJ</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="estado">
<label class="form-check-label">MG</label>
</div>

</div>

<!-- BOTÃO -->
<button type="submit" class="btn btn-warning w-100">
<i class="bi bi-check-circle"></i> Cadastrar
</button>

</form>

</div>
</div>
